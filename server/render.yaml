services:
  - type: web
    name: campus-exchange-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DASHSCOPE_API_KEY
        value: sk-sp-80d30ee1dfc44b72bd7b456d110b1727
      - key: DATABASE_URL
        fromDatabase:
          name: campus-exchange-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: campus-exchange-redis
          property: connectionString

databases:
  - name: campus-exchange-db
    databaseName: campus_exchange
    user: campus_exchange
    plan: free

redis:
  - name: campus-exchange-redis
    plan: free
    ipAllowList: []
